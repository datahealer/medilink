<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fdf8fe;
            color: #1c1b1f;
            -webkit-tap-highlight-color: transparent;
        }
        .serif-brand {

        }
        .material-symbols-outlined {

            width: 0px;

        }

            position: fixed;
            z-index: -1;
            filter: blur(60px);

            border-radius: 50%;

    body {

<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Biomorphic Background Accents -->
<div class="biomorphic-blob bg-secondary-container w-[300px] h-[300px] -top-20 -right-20"></div>
<div class="biomorphic-blob bg-tertiary-fixed w-[250px] h-[250px] bottom-40 -left-20"></div>
<!-- Top App Bar (Shared Component Logic) -->
<!-- According to Shell Visibility Rule: Sub-page features a "Back" action; navigation shell is suppressed. -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur-md flex items-center justify-between px-margin-mobile h-16 w-full">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors" onclick="history.back()">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="serif-brand font-headline-lg-mobile text-headline-lg-mobile text-primary">Edit Profile</h1>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="flex-1 px-margin-mobile py-stack-lg max-w-md mx-auto w-full">
<!-- Avatar Section -->
<section class="flex flex-col items-center mb-10">
<div class="relative group">
<div class="w-32 h-32 rounded-full overflow-hidden border-4 border-white shadow-xl">
<img alt="User Profile" class="w-full h-full object-cover" data-alt="A close-up portrait of a professional woman with a warm, confident expression, set against a soft-focus studio background. The lighting is diffused and high-key, aligning with a premium clinical aesthetic. Her features are clear and the overall image quality is sharp, emphasizing a clean, modern, and trustworthy healthcare persona. The color palette is dominated by soft whites and subtle skin tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBnICDoqNIHkNjqvDNK7JnD5jlAbfzSRKT8R2ysPozyfkDpyp9L_sUVeE2qO6G8K_YCokJuysM6T4QLW412zOk4uN3pu6Q-WuXZVWj6CWousjv-3rpqDMl0jXQzq6p2ZWQ9W3kgKuVU7e3G6dcUbnpEiVcR7QRMAIKgeuD9PMZ9FRpgoMkddiSAcz3w_61ZvLkNf42Oo04SD9LQlgXEnAAxlgbcuRKBMnm03wPIqlW20TczqDzOudy59r8wr8J2TTgfCctjOFwZU8On"/>
</div>
<button class="absolute bottom-1 right-1 bg-primary text-white w-10 h-10 rounded-full flex items-center justify-center border-2 border-white shadow-lg active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[20px]">photo_camera</span>
</button>
</div>
<p class="mt-stack-sm font-label-sm text-label-sm text-on-surface-variant">Tap to update photo</p>
</section>
<!-- Form Fields -->
<form class="space-y-stack-lg pb-32">
<!-- Name -->
<div class="flex flex-col space-y-2">
<label class="font-title-md text-body-sm text-on-surface-variant px-1" for="name">Full Name</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-lowest border border-[#DFC8E7] focus:border-primary focus:ring-0 text-body-lg font-body-lg transition-all outline-none" id="name" placeholder="Enter your name" type="text" value="Dr. Elena Rodriguez"/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col space-y-2">
<label class="font-title-md text-body-sm text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-lowest border border-[#DFC8E7] focus:border-primary focus:ring-0 text-body-lg font-body-lg transition-all outline-none" id="email" placeholder="Enter your email" type="email" value="elena.rodriguez@medilink.com"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
</div>
</div>
<!-- Phone -->
<div class="flex flex-col space-y-2">
<label class="font-title-md text-body-sm text-on-surface-variant px-1" for="phone">Phone Number</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-lowest border border-[#DFC8E7] focus:border-primary focus:ring-0 text-body-lg font-body-lg transition-all outline-none" id="phone" placeholder="Enter phone number" type="tel" value="+1 (555) 012-3456"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline text-[20px]">call</span>
</div>
</div>
<div class="grid grid-cols-2 gap-stack-md">
<!-- Date of Birth -->
<div class="flex flex-col space-y-2">
<label class="font-title-md text-body-sm text-on-surface-variant px-1" for="dob">Date of Birth</label>
<div class="relative">
<input class="w-full h-14 px-4 rounded-xl bg-surface-container-lowest border border-[#DFC8E7] focus:border-primary focus:ring-0 text-body-sm font-body-sm transition-all outline-none appearance-none" id="dob" placeholder="YYYY-MM-DD" type="date" value="1988-05-12"/>
</div>
</div>
<!-- Gender -->
<div class="flex flex-col space-y-2">
<label class="font-title-md text-body-sm text-on-surface-variant px-1" for="gender">Gender</label>
<div class="relative">
<select class="w-full h-14 px-4 rounded-xl bg-surface-container-lowest border border-[#DFC8E7] focus:border-primary focus:ring-0 text-body-sm font-body-sm transition-all outline-none appearance-none" id="gender">
<option selected="" value="female">Female</option>
<option value="male">Male</option>
<option value="non-binary">Non-binary</option>
<option value="prefer-not-to-say">Other</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
</div>
<!-- Health Information Section Card -->
<div class="mt-8 p-stack-md bg-secondary-container/30 rounded-xl border border-secondary-container flex items-center justify-between">
<div class="flex items-center space-x-3">
<div class="w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary">medical_information</span>
</div>
<div>
<h3 class="font-title-md text-on-secondary-container">Medical Records</h3>
<p class="text-label-sm text-on-secondary-container/80">Update clinical details</p>
</div>
</div>
<span class="material-symbols-outlined text-on-secondary-container">chevron_right</span>
</div>
</form>
</main>
<!-- Bottom Action Button -->
<div class="fixed bottom-0 left-0 w-full p-margin-mobile bg-gradient-to-t from-surface via-surface to-transparent pt-10">
<button class="w-full h-16 bg-primary text-on-primary rounded-full font-title-md flex items-center justify-center shadow-lg active:scale-[0.98] transition-all hover:opacity-90" id="saveChanges">
            Save Changes
        </button>
</div>
<!-- Micro-interactions Script -->
<script>
        document.getElementById('saveChanges').addEventListener('click', function() {
            const btn = this;
            const originalText = btn.innerHTML;
            
            // Interaction feedback
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined text-[24px]">check_circle</span> <span class="ml-2">Profile Updated</span>';
                btn.classList.replace('bg-primary', 'bg-tertiary-container');
                btn.classList.add('text-tertiary-fixed-dim');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.replace('bg-tertiary-container', 'bg-primary');
                    btn.classList.remove('text-tertiary-fixed-dim');
                }, 2000);
            }, 1200);
        });

        // Input focus effects
        const inputs = document.querySelectorAll('input, select');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
                input.parentElement.style.transition = 'transform 0.2s ease-out';
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
</body></html>
