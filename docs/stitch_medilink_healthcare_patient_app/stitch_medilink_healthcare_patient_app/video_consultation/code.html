<!-- INTERACTION SCRIPTS -->
<script>
        // Simple timer logic
        let seconds = 765; // 12:45
        const timerEl = document.getElementById('call-timer');
        
        setInterval(() => {
            seconds++;
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            timerEl.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
        }, 1000);

        // UI Toggle Function
        function toggleControl(btn) {
            const icon = btn.querySelector('.material-symbols-outlined');
            const label = btn.querySelector('span:not(.material-symbols-outlined)');
            
            if (btn.dataset.active === "true") {
                btn.dataset.active = "false";
                btn.querySelector('div').classList.remove('bg-primary', 'text-white');
                btn.querySelector('div').classList.add('bg-surface-container-high', 'text-primary');
                
                if (icon.innerText === 'mic_off') icon.innerText = 'mic';
                if (icon.innerText === 'videocam_off') icon.innerText = 'videocam';
            } else {
                btn.dataset.active = "true";
                btn.querySelector('div').classList.remove('bg-surface-container-high', 'text-primary');
                btn.querySelector('div').classList.add('bg-primary', 'text-white');
                
                if (icon.innerText === 'mic') icon.innerText = 'mic_off';
                if (icon.innerText === 'videocam') icon.innerText = 'videocam_off';
            }
        }

        // Draggable PiP (Mobile Friendly)
        const pip = document.querySelector('.cursor-grab');
        let isDragging = false;
        let startX, startY, initialX, initialY;

        pip.addEventListener('mousedown', startDrag);
        pip.addEventListener('touchstart', startDrag);

        function startDrag(e) {
            isDragging = true;
            const touch = e.type === 'touchstart' ? e.touches[0] : e;
            startX = touch.clientX;
            startY = touch.clientY;
            initialX = pip.offsetLeft;
            initialY = pip.offsetTop;
            document.addEventListener('mousemove', onDrag);
            document.addEventListener('touchmove', onDrag);
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        function onDrag(e) {
            if (!isDragging) return;
            const touch = e.type === 'touchmove' ? e.touches[0] : e;
            const dx = touch.clientX - startX;
            const dy = touch.clientY - startY;
            pip.style.left = `${initialX + dx}px`;
            pip.style.top = `${initialY + dy}px`;
            pip.style.right = 'auto'; // Break the initial right anchoring
        }

        function stopDrag() {
            isDragging = false;
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('touchmove', onDrag);
        }
    </script>
