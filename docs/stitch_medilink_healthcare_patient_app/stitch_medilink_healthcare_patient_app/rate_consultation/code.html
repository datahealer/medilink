<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Rate Your Consultation | MediLink</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);

      transform: scale(0.9);

                  "inverse-surface": "#313034",
                  "on-secondary-container": "#6e5c77",
                  "on-primary-fixed-variant": "#523d6c",
                  "error-container": "#ffdad6",
                  "on-primary-fixed": "#25113e",
                  "primary-container": "#2e1a47",
                  "on-tertiary-fixed": "#081d2e",
                  "inverse-primary": "#d6bcf4",
                  "on-tertiary-fixed-variant": "#36495b",
                  "outline-variant": "#ccc4cf",
                  "outline": "#7b757f",

          "borderRadius": {

          "spacing": {

                  "stack-sm": "8px",

      },

<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-lg min-h-screen flex flex-col items-center">
<!-- TopAppBar Logic (Sub-page: Hidden Shell implied by Task-Focus) -->
<header class="w-full max-w-md bg-surface flex justify-between items-center px-margin-mobile h-16 sticky top-0 z-50">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-surface-variant/50 transition-colors" onclick="window.history.back()">
<span class="material-symbols-outlined text-primary">close</span>
</button>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-primary tracking-tight">Consultation</h1>
<div class="w-10"></div> <!-- Spacer -->
</header>
<main class="w-full max-w-md px-margin-mobile flex flex-col gap-stack-lg pb-32">
<!-- Hero Header -->
<section class="mt-stack-lg text-center">
<div class="relative inline-block mb-stack-md">
<div class="w-24 h-24 rounded-full border-4 border-secondary-fixed overflow-hidden mx-auto shadow-lg">
<img alt="Dr. Julian Vance" class="w-full h-full object-cover" data-alt="A professional portrait of a senior male doctor with kind eyes and a warm smile, wearing a pristine white clinical coat and a navy blue stethoscope. The background is a soft-focus modern clinic with gentle purple and blue ambient lighting. The overall style is high-end editorial healthcare photography, emphasizing trust, professionalism, and premium care." src="https://lh3.googleusercontent.com/aida-public/AB6AXuALOn0JBvj7rB-_QPR0xidnxbuwU6OLTqQsSfySe6G6YGoSQYW0ULejE8YVAbRJ82V7bpYJStBMJsOGJ7XeNLcu0Meaw5gNNu7bECmIE2pAfnkNyOmULncn4u3twOSgwBuXqNJwHXmZSh37ARy-Hwl6gu0OLjVKarwvvPbDpPSaSuSfiLEzFeEmS3_KZ6QfTkkNP-Ssb8Tfsg7C06tXYH8V3sIbfLSuEL3ij5c-NmzVzG0Ryp2eeW6MAZvx5Gv2iOKQxtRxHuJaZQs5"/>
</div>
<div class="absolute -bottom-1 -right-1 bg-primary text-white p-1 rounded-full border-2 border-white">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h2 class="text-headline-lg-mobile font-headline-lg-mobile text-primary">Dr. Julian Vance</h2>
<p class="text-body-sm text-on-surface-variant font-body-sm">Consultation completed on Oct 24, 2:30 PM</p>
</section>
<!-- Star Rating Section -->
<section class="bg-surface-container-low rounded-xl p-stack-lg flex flex-col items-center shadow-sm">
<h3 class="text-title-md font-title-md text-primary mb-stack-sm">How was your visit?</h3>
<p class="text-body-sm text-on-surface-variant mb-stack-lg text-center">Your feedback helps us provide better care for everyone.</p>
<div class="flex gap-2" id="star-rating">
<button class="rating-bounce group p-1" data-value="1">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary-container transition-colors">star</span>
</button>
<button class="rating-bounce group p-1" data-value="2">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary-container transition-colors">star</span>
</button>
<button class="rating-bounce group p-1" data-value="3">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary-container transition-colors">star</span>
</button>
<button class="rating-bounce group p-1" data-value="4">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary-container transition-colors">star</span>
</button>
<button class="rating-bounce group p-1" data-value="5">
<span class="material-symbols-outlined text-4xl text-outline group-hover:text-primary-container transition-colors">star</span>
</button>
</div>
</section>
<!-- Tags Section -->
<section>
<h3 class="text-body-lg font-body-lg text-primary font-semibold mb-stack-sm">What went well?</h3>
<div class="flex flex-wrap gap-stack-sm">
<button class="tag-toggle px-4 py-2 rounded-full border border-outline-variant text-body-sm text-on-surface-variant bg-surface transition-all active:scale-95">
          Clear Communication
        </button>
<button class="tag-toggle px-4 py-2 rounded-full border border-outline-variant text-body-sm text-on-surface-variant bg-surface transition-all active:scale-95">
          Punctuality
        </button>
<button class="tag-toggle px-4 py-2 rounded-full border border-outline-variant text-body-sm text-on-surface-variant bg-surface transition-all active:scale-95">
          Helpfulness
        </button>
<button class="tag-toggle px-4 py-2 rounded-full border border-outline-variant text-body-sm text-on-surface-variant bg-surface transition-all active:scale-95">
          Bedside Manner
        </button>
<button class="tag-toggle px-4 py-2 rounded-full border border-outline-variant text-body-sm text-on-surface-variant bg-surface transition-all active:scale-95">
          Expertise
        </button>
</div>
</section>
<!-- Feedback Section -->
<section class="flex flex-col gap-stack-sm">
<label class="text-body-lg font-body-lg text-primary font-semibold" for="feedback">Additional Comments</label>
<textarea class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-4 text-body-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all resize-none outline-none" id="feedback" placeholder="Tell us more about your experience (optional)..." rows="4"></textarea>
</section>
<!-- Action Buttons -->
<section class="fixed bottom-0 left-0 w-full max-w-md bg-gradient-to-t from-background via-background to-transparent px-margin-mobile pt-8 pb-8 mx-auto right-0 flex gap-4">
<button class="flex-1 h-14 rounded-full bg-secondary-fixed text-primary font-title-md hover:brightness-95 transition-all">
        Skip
      </button>
<button class="flex-[2] h-14 rounded-full bg-primary text-on-primary font-title-md shadow-lg hover:shadow-xl active:scale-95 transition-all" onclick="handleSubmit()">
        Submit Review
      </button>
</section>
</main>
<!-- Success Splash Overlay (Initially Hidden) -->
<div class="fixed inset-0 bg-primary z-[100] flex flex-col items-center justify-center px-margin-mobile opacity-0 pointer-events-none transition-opacity duration-500" id="success-overlay">
<div class="relative w-32 h-32 mb-stack-lg">
<div class="absolute inset-0 bg-secondary-fixed opacity-20 rounded-full animate-ping"></div>
<div class="relative z-10 w-full h-full bg-on-primary rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-primary text-6xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
<h2 class="text-display-lg font-display-lg text-on-primary mb-2 text-center">Thank You</h2>
<p class="text-on-primary/70 text-body-lg text-center">Your feedback has been shared with Dr. Vance and our medical team.</p>
<button class="mt-12 px-8 py-3 rounded-full border border-on-primary text-on-primary hover:bg-on-primary/10 transition-colors" onclick="window.history.back()">
      Back to Home
    </button>
</div>
<script>
    // Rating Interaction
    const stars = document.querySelectorAll('#star-rating button');
    stars.forEach(star => {
      star.addEventListener('click', () => {
        const value = parseInt(star.getAttribute('data-value'));
        stars.forEach(s => {
          const sValue = parseInt(s.getAttribute('data-value'));
          const icon = s.querySelector('.material-symbols-outlined');
          if (sValue <= value) {
            icon.classList.add('star-active');
            icon.textContent = 'star';
          } else {
            icon.classList.remove('star-active');
            icon.textContent = 'star';
          }
        });
      });
    });

    // Tag Selection
    const tags = document.querySelectorAll('.tag-toggle');
    tags.forEach(tag => {
      tag.addEventListener('click', () => {
        tag.classList.toggle('bg-primary-container');
        tag.classList.toggle('text-on-primary-container');
        tag.classList.toggle('border-primary-container');
        tag.classList.toggle('bg-surface');
        tag.classList.toggle('text-on-surface-variant');
      });
    });

    // Submit Action
    function handleSubmit() {
      const overlay = document.getElementById('success-overlay');
      overlay.classList.remove('opacity-0', 'pointer-events-none');
      overlay.classList.add('opacity-100');
    }

    // Micro-interaction: Subtle parallax on the doctor image container on mouse move
    document.addEventListener('mousemove', (e) => {
      const avatar = document.querySelector('.w-24.h-24');
      if (avatar) {
        const mouseX = (e.clientX / window.innerWidth - 0.5) * 10;
        const mouseY = (e.clientY / window.innerHeight - 0.5) * 10;
        avatar.style.transform = `translate(${mouseX}px, ${mouseY}px)`;
      }
    });
  </script>
</body></html>
